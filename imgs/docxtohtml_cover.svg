<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
  </g>

  <!-- Left: Word Docx Icon -->
  <g transform="translate(100, 140)" filter="url(#shadow)">
    <rect x="0" y="0" width="90" height="110" rx="8" fill="#2b579a"/>
    <rect x="0" y="0" width="90" height="110" rx="8" fill="none" stroke="#5a9bd5" stroke-width="1"/>
    <!-- Document lines -->
    <rect x="12" y="18" width="50" height="4" rx="2" fill="#5a9bd5"/>
    <rect x="12" y="28" width="66" height="4" rx="2" fill="#5a9bd5"/>
    <rect x="12" y="38" width="55" height="4" rx="2" fill="#5a9bd5"/>
    <rect x="12" y="48" width="60" height="4" rx="2" fill="#5a9bd5"/>
    <rect x="12" y="58" width="40" height="4" rx="2" fill="#5a9bd5"/>
    <!-- W logo -->
    <text x="45" y="98" text-anchor="middle" font-size="28" font-weight="bold" fill="white" font-family="Arial">W</text>
  </g>

  <!-- Center: Python + Transform Arrow -->
  <g transform="translate(270, 170)">
    <!-- Python logo circle -->
    <circle cx="0" cy="15" r="42" fill="none" stroke="#ffd43b" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="15" r="35" fill="none" stroke="#306998" stroke-width="2" opacity="0.4"/>
    <!-- Python text -->
    <text x="0" y="22" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffd43b">Python</text>
  </g>

  <!-- Arrow from Docx to Python -->
  <line x1="195" y1="195" x2="240" y2="195" stroke="url(#arrow)" stroke-width="3"/>
  <polygon points="240,188 255,195 240,202" fill="#533483"/>

  <!-- Arrow from Python to HTML -->
  <line x1="310" y1="195" x2="372" y2="195" stroke="url(#arrow)" stroke-width="3"/>
  <polygon points="372,188 387,195 372,202" fill="#533483"/>

  <!-- Right: HTML file icon -->
  <g transform="translate(490, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="130" rx="8" fill="#e44d26"/>
    <!-- HTML text -->
    <text x="50" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="white">&lt;/&gt;</text>
    <text x="50" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="white">HTML</text>
    <!-- Bracket lines -->
    <rect x="15" y="78" width="70" height="3" rx="1.5" fill="#ff9966" opacity="0.6"/>
    <rect x="15" y="85" width="55" height="3" rx="1.5" fill="#ff9966" opacity="0.6"/>
    <rect x="15" y="92" width="65" height="3" rx="1.5" fill="#ff9966" opacity="0.6"/>
    <rect x="15" y="99" width="40" height="3" rx="1.5" fill="#ff9966" opacity="0.6"/>
  </g>

  <!-- Base64 label between Python and HTML -->
  <text x="350" y="175" text-anchor="middle" font-size="10" fill="#e94560" opacity="0.8">base64</text>
  <text x="350" y="230" text-anchor="middle" font-size="10" fill="#00b8a9" opacity="0.8">GUI</text>

  <!-- Title at bottom -->
  <text x="400" y="360" text-anchor="middle" font-size="22" font-weight="bold" fill="white" letter-spacing="2">Docx → Html5</text>
  <text x="400" y="388" text-anchor="middle" font-size="12" fill="#8899aa">Python · pywin32 · base64 · tkinter</text>

  <!-- Subtitle at top -->
  <text x="400" y="65" text-anchor="middle" font-size="16" fill="#e94560" opacity="0.9" letter-spacing="6">WORD 文 档 转 换</text>

  <!-- Small decorative dots -->
  <circle cx="50" cy="50" r="2" fill="#e94560" opacity="0.5"/>
  <circle cx="750" cy="60" r="2" fill="#533483" opacity="0.5"/>
  <circle cx="700" cy="350" r="2" fill="#ffd43b" opacity="0.5"/>
  <circle cx="100" cy="340" r="2" fill="#00b8a9" opacity="0.5"/>
</svg>
