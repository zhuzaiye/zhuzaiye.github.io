<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0628"/>
      <stop offset="50%" style="stop-color:#1a0a3e"/>
      <stop offset="100%" style="stop-color:#0d0628"/>
    </linearGradient>
    <linearGradient id="attn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ee5a24"/>
      <stop offset="100%" style="stop-color:#f0932b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="16" fill="#ee5a24" opacity="0.6" letter-spacing="10">TRANSFORMER</text>

  <!-- QKV Attention visualization -->
  <!-- Input X -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <rect x="-35" y="-16" width="70" height="32" rx="4" fill="#2d1b69" stroke="#5a3da8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="bold" fill="white">X</text>
  </g>

  <!-- W_Q, W_K, W_V matrices -->
  <g transform="translate(210, 65)" filter="url(#shadow)">
    <rect x="-30" y="-12" width="60" height="26" rx="3" fill="#6c5ce7" opacity="0.7"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="white">W_Q</text>
  </g>
  <g transform="translate(210, 100)" filter="url(#shadow)">
    <rect x="-30" y="-12" width="60" height="26" rx="3" fill="#a29bfe" opacity="0.7"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="white">W_K</text>
  </g>
  <g transform="translate(210, 135)" filter="url(#shadow)">
    <rect x="-30" y="-12" width="60" height="26" rx="3" fill="#dfe6e9" opacity="0.7"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d1b69">W_V</text>
  </g>

  <!-- Q, K, V outputs -->
  <g transform="translate(340, 65)" filter="url(#shadow)">
    <rect x="-30" y="-12" width="60" height="26" rx="3" fill="#ff6b6b" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Q</text>
  </g>
  <g transform="translate(340, 100)" filter="url(#shadow)">
    <rect x="-30" y="-12" width="60" height="26" rx="3" fill="#f0932b" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="white">K</text>
  </g>
  <g transform="translate(340, 135)" filter="url(#shadow)">
    <rect x="-30" y="-12" width="60" height="26" rx="3" fill="#fdcb6e" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d1b69">V</text>
  </g>

  <!-- Arrows: X -> W_Q/K/V -->
  <g stroke="#5a3da8" stroke-width="1" opacity="0.4">
    <line x1="115" y1="95" x2="180" y2="78"/>
    <line x1="115" y1="100" x2="180" y2="112"/>
    <line x1="115" y1="105" x2="180" y2="147"/>
  </g>

  <!-- Arrows: W_Q/K/V -> Q/K/V -->
  <g stroke="#5a3da8" stroke-width="1" opacity="0.4">
    <line x1="240" y1="78" x2="310" y2="78"/>
    <line x1="240" y1="112" x2="310" y2="112"/>
    <line x1="240" y1="147" x2="310" y2="147"/>
  </g>

  <!-- Attention formula: Softmax(QK^T / sqrt(d_k)) V -->
  <g transform="translate(460, 85)" filter="url(#shadow)">
    <rect x="-95" y="-30" width="190" height="60" rx="6" fill="#1a0a3e" stroke="#ee5a24" stroke-width="1" opacity="0.9"/>
    <text x="0" y="-10" text-anchor="middle" font-size="10" fill="#ee5a24" font-family="monospace">Softmax</text>
    <text x="0" y="10" text-anchor="middle" font-size="10" fill="#f0932b" font-family="monospace">QKᵀ / √dₖ · V</text>
    <text x="0" y="25" text-anchor="middle" font-size="8" fill="#5a3da8">Attention</text>
  </g>

  <!-- Arrow to output -->
  <g stroke="#ee5a24" stroke-width="1.5" opacity="0.5">
    <line x1="650" y1="100" x2="710" y2="100"/>
  </g>

  <!-- Output -->
  <g transform="translate(740, 100)" filter="url(#shadow)">
    <rect x="-35" y="-16" width="70" height="32" rx="4" fill="#ff6b6b" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Output</text>
  </g>

  <!-- Bottom: Key concepts -->
  <g transform="translate(0, 200)">
    <!-- Multi-Head block -->
    <rect x="80" y="20" width="230" height="100" rx="6" fill="#1a0a3e" stroke="#5a3da8" stroke-width="0.8"/>
    <text x="195" y="45" text-anchor="middle" font-size="11" font-weight="bold" fill="#a29bfe">Multi-Head Attention</text>
    <text x="195" y="65" text-anchor="middle" font-size="9" fill="#6c5ce7">head₁ ｜ head₂ ｜ ... ｜ headₕ</text>
    <text x="195" y="85" text-anchor="middle" font-size="9" fill="#6c5ce7">Concat + W_O → Output</text>
    <text x="195" y="105" text-anchor="middle" font-size="8" fill="#5a3da8">并行计算，多视角关注</text>

    <!-- Encoder-Decoder block -->
    <rect x="340" y="20" width="180" height="100" rx="6" fill="#1a0a3e" stroke="#ee5a24" stroke-width="0.8"/>
    <text x="430" y="45" text-anchor="middle" font-size="11" font-weight="bold" fill="#ee5a24">Encoder · Decoder</text>
    <text x="430" y="65" text-anchor="middle" font-size="9" fill="#f0932b">N× EncoderBlock</text>
    <text x="430" y="85" text-anchor="middle" font-size="9" fill="#f0932b">N× DecoderBlock</text>
    <text x="430" y="105" text-anchor="middle" font-size="8" fill="#5a3da8">残差 · LayerNorm · FFN</text>

    <!-- Positional Encoding block -->
    <rect x="550" y="20" width="180" height="100" rx="6" fill="#1a0a3e" stroke="#fdcb6e" stroke-width="0.8"/>
    <text x="640" y="45" text-anchor="middle" font-size="11" font-weight="bold" fill="#fdcb6e">Positional Encoding</text>
    <text x="640" y="65" text-anchor="middle" font-size="9" fill="#fdcb6e">sin(pos / 10000^(2i/d))</text>
    <text x="640" y="85" text-anchor="middle" font-size="9" fill="#fdcb6e">cos(pos / 10000^(2i/d))</text>
    <text x="640" y="105" text-anchor="middle" font-size="8" fill="#5a3da8">注入位置信息</text>
  </g>

  <!-- Bottom subtitle -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#5a3da8">NLP · Self-Attention · Token Embedding · PyTorch · Seq2Seq</text>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="2" fill="#ff6b6b" opacity="0.3"/>
  <circle cx="750" cy="55" r="2" fill="#a29bfe" opacity="0.3"/>
  <circle cx="45" cy="350" r="2" fill="#fdcb6e" opacity="0.3"/>
  <circle cx="755" cy="360" r="2" fill="#ee5a24" opacity="0.3"/>
</svg>
