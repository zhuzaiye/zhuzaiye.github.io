<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="target" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="dep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
    <linearGradient id="cmd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f78166"/>
      <stop offset="100%" style="stop-color:#da3633"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.03" stroke="white" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <!-- Title area -->
  <text x="400" y="55" text-anchor="middle" font-size="18" fill="#58a6ff" opacity="0.85" letter-spacing="8">MAKEFILE</text>

  <!-- Dependency tree visualization -->
  <!-- Root: TARGET -->
  <g transform="translate(400, 115)" filter="url(#shadow)">
    <rect x="-70" y="-18" width="140" height="36" rx="6" fill="url(#target)"/>
    <text x="0" y="6" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Target</text>
  </g>

  <!-- Lines from target to deps -->
  <line x1="400" y1="133" x2="250" y2="180" stroke="#30363d" stroke-width="2"/>
  <line x1="400" y1="133" x2="550" y2="180" stroke="#30363d" stroke-width="2"/>

  <!-- Left dep: .o file 1 -->
  <g transform="translate(250, 200)" filter="url(#shadow)">
    <rect x="-65" y="-18" width="130" height="36" rx="6" fill="url(#dep)"/>
    <text x="0" y="6" text-anchor="middle" font-size="13" font-weight="bold" fill="white">main.o</text>
  </g>

  <!-- Right dep: .o file 2 -->
  <g transform="translate(550, 200)" filter="url(#shadow)">
    <rect x="-65" y="-18" width="130" height="36" rx="6" fill="url(#dep)"/>
    <text x="0" y="6" text-anchor="middle" font-size="13" font-weight="bold" fill="white">utils.o</text>
  </g>

  <!-- Lines from .o to .c -->
  <line x1="250" y1="218" x2="190" y2="270" stroke="#30363d" stroke-width="2"/>
  <line x1="250" y1="218" x2="310" y2="270" stroke="#30363d" stroke-width="2"/>
  <line x1="550" y1="218" x2="490" y2="270" stroke="#30363d" stroke-width="2"/>
  <line x1="550" y1="218" x2="610" y2="270" stroke="#30363d" stroke-width="2"/>

  <!-- Bottom deps: .c files -->
  <g transform="translate(190, 290)" filter="url(#shadow)">
    <rect x="-55" y="-16" width="110" height="32" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#8b949e">main.c</text>
  </g>
  <g transform="translate(310, 290)" filter="url(#shadow)">
    <rect x="-55" y="-16" width="110" height="32" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#8b949e">utils.h</text>
  </g>
  <g transform="translate(490, 290)" filter="url(#shadow)">
    <rect x="-55" y="-16" width="110" height="32" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#8b949e">utils.c</text>
  </g>
  <g transform="translate(610, 290)" filter="url(#shadow)">
    <rect x="-55" y="-16" width="110" height="32" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#8b949e">utils.h</text>
  </g>

  <!-- Right side: Makefile syntax snippet -->
  <g transform="translate(660, 160)">
    <rect x="-90" y="-50" width="180" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" opacity="0.9"/>
    <text x="-80" y="-32" font-size="10" fill="#8b949e" font-family="monospace">target: deps</text>
    <text x="-70" y="-14" font-size="10" fill="#f78166" font-family="monospace">gcc -o $@ $^</text>
    <text x="-80" y="10" font-size="10" fill="#484f58" font-family="monospace"># $@ = target</text>
    <text x="-80" y="26" font-size="10" fill="#484f58" font-family="monospace"># $^ = all deps</text>
    <text x="-80" y="42" font-size="10" fill="#484f58" font-family="monospace"># $&lt; = first dep</text>
  </g>

  <!-- Bottom tech stack line -->
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="#484f58">g++ · .PHONY · Automatic Variables · foreach · ifeq · call</text>

  <!-- Decorative dots -->
  <circle cx="60" cy="60" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="740" cy="50" r="2" fill="#3fb950" opacity="0.4"/>
  <circle cx="50" cy="350" r="2" fill="#f78166" opacity="0.4"/>
  <circle cx="750" cy="360" r="2" fill="#58a6ff" opacity="0.4"/>
</svg>
