<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#132742"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c9ff"/>
      <stop offset="100%" style="stop-color:#0072ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="white" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
  </g>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-size="18" fill="#00c9ff" opacity="0.7" letter-spacing="8">RUSTDESK</text>

  <!-- Left: Docker server -->
  <g transform="translate(160, 180)" filter="url(#shadow)">
    <rect x="-80" y="-70" width="160" height="140" rx="8" fill="#0d2137" stroke="#1e4976" stroke-width="1.5"/>
    <!-- Docker whale simplified -->
    <text x="0" y="-25" text-anchor="middle" font-size="28" fill="#00c9ff">&#x229A;</text>
    <text x="0" y="10" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Docker Server</text>
    <!-- Container boxes -->
    <rect x="-50" y="25" width="100" height="16" rx="3" fill="#0072ff" opacity="0.6"/>
    <text x="0" y="36" text-anchor="middle" font-size="8" fill="white">hbbs :21116</text>
    <rect x="-50" y="46" width="100" height="16" rx="3" fill="#00c9ff" opacity="0.5"/>
    <text x="0" y="57" text-anchor="middle" font-size="8" fill="white">hbbr :21117</text>
  </g>

  <!-- Connection lines -->
  <g stroke="#1e4976" stroke-width="2" stroke-dasharray="6,4">
    <line x1="240" y1="180" x2="320" y2="180"/>
    <line x1="480" y1="180" x2="560" y2="180"/>
  </g>

  <!-- Center: Network / Relay -->
  <g transform="translate(400, 180)" filter="url(#glow)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#00c9ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#0072ff" stroke-width="1" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" fill="white">Relay</text>
  </g>

  <!-- Right: Client devices -->
  <g transform="translate(670, 140)" filter="url(#shadow)">
    <rect x="-55" y="-40" width="110" height="75" rx="6" fill="#0d2137" stroke="#1e4976" stroke-width="1"/>
    <text x="0" y="-15" text-anchor="middle" font-size="16" fill="#00c9ff">&#x1F4BB;</text>
    <text x="0" y="8" text-anchor="middle" font-size="10" fill="white">RustDesk</text>
    <text x="0" y="22" text-anchor="middle" font-size="10" fill="white">Client</text>
  </g>
  <g transform="translate(670, 250)" filter="url(#shadow)">
    <rect x="-55" y="-40" width="110" height="75" rx="6" fill="#0d2137" stroke="#1e4976" stroke-width="1"/>
    <text x="0" y="-15" text-anchor="middle" font-size="16" fill="#00c9ff">&#x1F4F1;</text>
    <text x="0" y="8" text-anchor="middle" font-size="10" fill="white">RustDesk</text>
    <text x="0" y="22" text-anchor="middle" font-size="10" fill="white">Client</text>
  </g>

  <!-- Key icon -->
  <g transform="translate(400, 130)">
    <text x="0" y="0" text-anchor="middle" font-size="10" fill="#ffd43b" opacity="0.7">id_ed25519</text>
  </g>

  <!-- Bottom subtitle -->
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="#5a7a9a">Self-Hosted · Docker · hbbs/hbbr · Secure Key</text>

  <!-- Decorative elements -->
  <circle cx="50" cy="60" r="2" fill="#00c9ff" opacity="0.3"/>
  <circle cx="750" cy="50" r="2" fill="#0072ff" opacity="0.3"/>
  <circle cx="60" cy="350" r="2" fill="#ffd43b" opacity="0.3"/>
  <circle cx="740" cy="360" r="2" fill="#00c9ff" opacity="0.3"/>
</svg>
